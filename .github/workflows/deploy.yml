name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 當 main 分支有異動被 push 時觸發

# 賦予 GitHub Actions 寫入倉庫的權限，以便推送至 gh-pages 分支
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 專案程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: 安裝依賴套件並執行編譯
        run: |
          npm install
          npm run build

      - name: 自動發布至 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
